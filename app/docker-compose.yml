services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/persistencia/mysql/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uuno', '-puno']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    command: >
      sh -c "if [ \"$NODE_ENV\" = \"development\" ]; then
        mkdir -p logs && : > logs/app.log && : > logs/error.log;
      fi;
      node src/app.js"
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data:
