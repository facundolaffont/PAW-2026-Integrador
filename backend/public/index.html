<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNO Argentino</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #1a4971;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      h1 {
        margin: 24px 0 8px;
        font-size: 2rem;
        letter-spacing: 2px;
      }

      /* ── Pantallas ── */
      .pantalla {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
        max-width: 600px;
        padding: 20px;
      }
      .pantalla.activa {
        display: flex;
      }

      /* ── Formularios ── */
      input,
      select {
        padding: 10px 14px;
        border-radius: 8px;
        border: none;
        font-size: 1rem;
        width: 100%;
        max-width: 320px;
      }

      button {
        padding: 10px 24px;
        border-radius: 8px;
        border: none;
        font-size: 1rem;
        cursor: pointer;
        background: #f0a500;
        color: #1a4971;
        font-weight: bold;
        transition: background 0.2s;
      }
      button:hover {
        background: #ffc533;
      }
      button.secundario {
        background: #2e6da4;
        color: #fff;
      }
      button.secundario:hover {
        background: #3a82c4;
      }
      button.peligro {
        background: #c0392b;
        color: #fff;
      }

      /* ── Sala de espera ── */
      #lista-partidas {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .fila-partida {
        background: #2e6da4;
        border-radius: 8px;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* ── Partida ── */
      #pantalla-partida {
        max-width: 900px;
      }

      #info-turno {
        font-size: 1.1rem;
        background: #2e6da4;
        padding: 8px 20px;
        border-radius: 8px;
        width: 100%;
        text-align: center;
      }

      #area-rivales {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: 100%;
      }

      .rival {
        background: #2e6da4;
        border-radius: 10px;
        padding: 10px 16px;
        text-align: center;
        min-width: 120px;
      }
      .rival.en-turno {
        border: 2px solid #f0a500;
      }

      #mesa {
        display: flex;
        gap: 24px;
        align-items: center;
        justify-content: center;
        margin: 8px 0;
      }

      .carta-mesa {
        width: 72px;
        height: 100px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: bold;
        color: #fff;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        border: 3px solid rgba(255, 255, 255, 0.3);
      }

      #mazo-btn {
        width: 72px;
        height: 100px;
        border-radius: 10px;
        background: #1a4971;
        border: 3px dashed #fff;
        font-size: 2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s;
      }
      #mazo-btn:hover {
        transform: scale(1.05);
      }

      #mi-mano {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        width: 100%;
      }

      .carta {
        width: 64px;
        height: 90px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        font-weight: bold;
        color: #fff;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        border: 2px solid rgba(255, 255, 255, 0.3);
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
        user-select: none;
      }
      .carta:hover {
        transform: translateY(-8px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      }
      .carta.seleccionada {
        transform: translateY(-12px);
        box-shadow: 0 0 0 3px #f0a500;
      }

      #acciones {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      #selector-color {
        display: none;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn-color {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: 3px solid #fff;
        cursor: pointer;
        font-size: 0;
        transition: transform 0.1s;
      }
      .btn-color:hover {
        transform: scale(1.15);
      }

      /* ── Log ── */
      #log {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 10px;
        max-height: 120px;
        overflow-y: auto;
        font-size: 0.85rem;
        display: flex;
        flex-direction: column-reverse;
        gap: 2px;
      }
      .log-item {
        opacity: 0.9;
      }

      /* ── Overlay fin de partida ── */
      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      #overlay.visible {
        display: flex;
      }
      #overlay-contenido {
        background: #1a4971;
        border: 3px solid #f0a500;
        border-radius: 16px;
        padding: 32px 48px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      #overlay-contenido h2 {
        font-size: 1.8rem;
        color: #f0a500;
      }

      .error {
        color: #ff6b6b;
        font-size: 0.9rem;
      }
      hr {
        width: 100%;
        border-color: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <h1>🃏 UNO Argentino</h1>

    <!-- ── LOGIN ── -->
    <div id="pantalla-login" class="pantalla activa">
      <input id="input-nombre" type="text" placeholder="Tu nombre de usuario" maxlength="20" />
      <button onclick="registrarOIngresar()">Entrar</button>
      <span id="error-login" class="error"></span>
    </div>

    <!-- ── LOBBY ── -->
    <div id="pantalla-lobby" class="pantalla">
      <p id="saludo"></p>
      <hr />
      <h3>Crear partida</h3>
      <label>Bots: <select id="sel-bots">
        <option value="0">Sin bots (esperar jugadores)</option>
        <option value="1">1 bot</option>
        <option value="2" selected>2 bots</option>
        <option value="3">3 bots</option>
      </select></label>
      <button onclick="crearPartida()">Crear partida</button>
      <hr />
      <h3>Partidas disponibles</h3>
      <button class="secundario" onclick="cargarPartidas()">↻ Actualizar</button>
      <div id="lista-partidas"><em>Cargando...</em></div>
    </div>

    <!-- ── ESPERA ── -->
    <div id="pantalla-espera" class="pantalla">
      <p>Sala creada. Esperando jugadores...</p>
      <p id="espera-info"></p>
      <button onclick="iniciarPartida()">Iniciar partida</button>
      <button class="secundario" onclick="volverLobby()">Volver al lobby</button>
    </div>

    <!-- ── PARTIDA ── -->
    <div id="pantalla-partida" class="pantalla">
      <div id="info-turno">Esperando...</div>

      <div id="area-rivales"></div>

      <div id="mesa">
        <button id="mazo-btn" title="Robar carta" onclick="robarCarta()">🂠</button>
        <div id="carta-en-mesa" class="carta-mesa">—</div>
      </div>

      <div id="mi-mano"></div>

      <div id="acciones">
        <button onclick="jugarCartaSeleccionada()">Jugar carta</button>
        <button class="secundario" onclick="cantarUno()">UNO 🗣</button>
        <button class="secundario" onclick="denunciarUno()">Denunciar UNO</button>
      </div>

      <div id="selector-color">
        <button class="btn-color" style="background:#e74c3c" onclick="elegirColor('rojo')" title="Rojo"></button>
        <button class="btn-color" style="background:#3498db" onclick="elegirColor('azul')" title="Azul"></button>
        <button class="btn-color" style="background:#2ecc71" onclick="elegirColor('verde')" title="Verde"></button>
        <button class="btn-color" style="background:#f1c40f" onclick="elegirColor('amarillo')" title="Amarillo"></button>
      </div>

      <div id="log"></div>
    </div>

    <!-- ── OVERLAY FIN ── -->
    <div id="overlay">
      <div id="overlay-contenido">
        <h2 id="overlay-titulo">Partida terminada</h2>
        <div id="overlay-cuerpo"></div>
        <button onclick="volverLobby()">Volver al lobby</button>
      </div>
    </div>

    <script>
      // ── Estado ──────────────────────────────────────────────────────────────
      let jugadorId = null;
      let nombreUsuario = null;
      let partidaId = null;
      let ws = null;
      let cartaSeleccionada = null;
      let turnoActual = null;
      let rivalesActuales = [];
      let autoIniciar = false;

      const COLORES_CSS = {
        rojo: '#e74c3c',
        azul: '#3498db',
        verde: '#2ecc71',
        amarillo: '#f1c40f',
        null: '#555',
      };

      // ── Pantallas ───────────────────────────────────────────────────────────
      function mostrar(id) {
        document.querySelectorAll('.pantalla').forEach((p) => p.classList.remove('activa'));
        document.getElementById(id).classList.add('activa');
      }

      // ── Login ───────────────────────────────────────────────────────────────
      async function registrarOIngresar() {
        const nombre = document.getElementById('input-nombre').value.trim();
        if (!nombre) return;

        // Intentar login primero, si no existe registrar
        let res = await fetch('/api/ingresar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombreUsuario: nombre }),
        });

        if (res.status === 404) {
          res = await fetch('/api/registrarse', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombreUsuario: nombre }),
          });
        }

        if (!res.ok) {
          const err = await res.json();
          document.getElementById('error-login').textContent = err.error;
          return;
        }

        const data = await res.json();
        jugadorId = data.jugadorId;
        nombreUsuario = data.nombreUsuario;
        document.getElementById('saludo').textContent = `Hola, ${nombreUsuario} 👋`;
        mostrar('pantalla-lobby');
        cargarPartidas();
      }

      // ── Lobby ───────────────────────────────────────────────────────────────
      async function cargarPartidas() {
        const res = await fetch('/api/partidas');
        const lista = await res.json();
        const cont = document.getElementById('lista-partidas');

        if (!lista.length) {
          cont.innerHTML = '<em>No hay partidas disponibles.</em>';
          return;
        }

        cont.innerHTML = lista
          .map(
            (p) => `
          <div class="fila-partida">
            <span>${p.jugadores.join(', ')} — ${p.jugadores.length}/${p.maxJugadores}</span>
            <button onclick="unirsePartida('${p.partidaId}')">Unirse</button>
          </div>`
          )
          .join('');
      }

      async function crearPartida() {
        const cantidadBots = parseInt(document.getElementById('sel-bots').value);
        const res = await fetch('/api/partidas', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jugadorId, cantidadBots }),
        });
        const data = await res.json();
        if (!res.ok) return alert(data.error);

        partidaId = data.partidaId;
        document.getElementById('espera-info').textContent =
          `ID: ${partidaId} — Jugadores: ${data.jugadores.join(', ')}`;
        // Si tiene bots, auto-iniciar al conectar (sala ya está completa)
        autoIniciar = cantidadBots > 0;
        conectarWS();
        mostrar('pantalla-espera');
      }

      async function unirsePartida(id) {
        partidaId = id;
        conectarWS();
        mostrar('pantalla-partida');
      }

      // ── WebSocket ───────────────────────────────────────────────────────────
      function conectarWS() {
        if (ws) ws.close();
        ws = new WebSocket(`ws://localhost:3000?jugadorId=${jugadorId}&partidaId=${partidaId}`);

        ws.onopen = () => {
          if (autoIniciar) {
            autoIniciar = false;
            // Pequeño delay para asegurar que el servidor procesó la conexión
            setTimeout(() => enviar('iniciar-partida'), 200);
          }
        };

        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          manejarEvento(msg);
        };

        ws.onerror = () => log('❌ Error de conexión');
        ws.onclose = () => log('🔌 Desconectado');
      }

      function enviar(accion, payload = {}) {
        if (ws?.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ accion, ...payload }));
        }
      }

      // ── Eventos del servidor ─────────────────────────────────────────────
      function manejarEvento(msg) {
        switch (msg.evento) {
          case 'estado-partida':
            renderizarEstado(msg.estado);
            if (msg.estado.estado === 'jugando') mostrar('pantalla-partida');
            break;
          case 'jugador-unido':
            log(`👤 ${msg.nombreUsuario} se unió (${msg.totalJugadores} jugadores)`);
            break;
          case 'carta-jugada':
            actualizarCartaMesa(msg.carta);
            if (msg.jugadorId === jugadorId) {
              document.querySelector(`.carta[data-id="${msg.carta.id}"]`)?.remove();
              cartaSeleccionada = null;
            }
            log(`🃏 ${nombreDeJugador(msg.jugadorId)} jugó ${describir(msg.carta)}`);
            break;
          case 'cartas-robadas':
            renderizarMano(msg.cartasRobadas, true);
            log(`🤚 Robaste ${msg.cartasRobadas.length} carta(s)`);
            break;
          case 'turno-cambiado':
            turnoActual = msg.turno;
            actualizarInfoTurno(msg);
            if (msg.robó) log(`🤚 ${nombreDeJugador(msg.robó.jugadorId)} robó ${msg.robó.cantidad} carta(s)`);
            break;
          case 'uno-cantado':
            log(`🗣 ¡${msg.nombreUsuario} cantó UNO!`);
            break;
          case 'uno-denunciado':
            log(`⚠️ ${msg.acusado} fue denunciado por no cantar UNO → roba 2`);
            break;
          case 'ronda-terminada':
            log(`🏆 Ronda terminada. Ganador: ${nombreDeJugador(msg.ganadorRonda)} (+${msg.puntosGanados} pts)`);
            break;
          case 'partida-terminada':
            mostrarFin(msg.ranking, false);
            break;
          case 'jugador-abandono':
            mostrarFin(null, true, msg.nombreUsuario);
            break;
          case 'error':
            log(`❌ ${msg.mensaje}`);
            break;
        }
      }

      // ── Render ──────────────────────────────────────────────────────────────
      function actualizarCartaMesa(carta) {
        if (!carta) return;
        const mesaEl = document.getElementById('carta-en-mesa');
        const color = carta.colorElegido || carta.color;
        mesaEl.style.background = COLORES_CSS[color] || '#555';
        mesaEl.textContent = etiqueta(carta);
      }

      function renderizarEstado(estado) {
        turnoActual = estado.turno;

        // Carta en mesa
        actualizarCartaMesa(estado.cartaEnMesa);

        // Rivales
        rivalesActuales = estado.jugadores.filter((j) => j.jugadorId !== jugadorId);
        const areaRivales = document.getElementById('area-rivales');
        areaRivales.innerHTML = rivalesActuales
          .map(
            (j) => `
          <div class="rival ${j.jugadorId === turnoActual ? 'en-turno' : ''}" id="rival-${j.jugadorId}">
            <div>${j.nombreUsuario}</div>
            <div>${'🂠'.repeat(Math.min(j.cantidadCartas, 10))} (${j.cantidadCartas})</div>
            <div>${estado.puntajesRonda[j.jugadorId] || 0} pts</div>
          </div>`
          )
          .join('');

        // Mi mano
        const yo = estado.jugadores.find((j) => j.jugadorId === jugadorId);
        if (yo?.mano) renderizarMano(yo.mano);

        actualizarInfoTurno({ turno: estado.turno, sentido: estado.sentido, penalidad: estado.penalidad });
      }

      function renderizarMano(mano, agregar = false) {
        const cont = document.getElementById('mi-mano');
        if (!agregar) cont.innerHTML = '';
        mano.forEach((carta) => {
          const el = document.createElement('div');
          const color = carta.colorElegido || carta.color;
          el.className = 'carta';
          el.style.background = COLORES_CSS[color] || '#555';
          el.textContent = etiqueta(carta);
          el.dataset.id = carta.id;
          el.dataset.esComodin = carta.color === null ? '1' : '0';
          el.onclick = () => seleccionarCarta(el);
          cont.appendChild(el);
        });
      }

      function seleccionarCarta(el) {
        document.querySelectorAll('.carta').forEach((c) => c.classList.remove('seleccionada'));
        el.classList.add('seleccionada');
        cartaSeleccionada = { id: el.dataset.id, esComodin: el.dataset.esComodin === '1' };
        document.getElementById('selector-color').style.display =
          cartaSeleccionada.esComodin ? 'flex' : 'none';
      }

      function actualizarInfoTurno(msg) {
        const esMiTurno = msg.turno === jugadorId;
        const sentidoTexto = msg.sentido === 1 ? '↻' : '↺';
        const penalidad = msg.penalidad ? ` | Penalidad acumulada: +${msg.penalidad}` : '';
        document.getElementById('info-turno').textContent = esMiTurno
          ? `Es tu turno ${sentidoTexto}${penalidad}`
          : `Turno de ${nombreDeJugador(msg.turno)} ${sentidoTexto}${penalidad}`;

        // Actualizar borde de rivales
        document.querySelectorAll('.rival').forEach((el) => el.classList.remove('en-turno'));
        const rivalEl = document.getElementById(`rival-${msg.turno}`);
        if (rivalEl) rivalEl.classList.add('en-turno');
      }

      // ── Acciones ────────────────────────────────────────────────────────────
      function jugarCartaSeleccionada() {
        if (!cartaSeleccionada) return log('Seleccioná una carta primero');
        if (cartaSeleccionada.esComodin) return log('Elegí un color primero');
        enviar('jugar-carta', { cartaId: cartaSeleccionada.id });
        cartaSeleccionada = null;
        document.getElementById('selector-color').style.display = 'none';
      }

      function elegirColor(color) {
        if (!cartaSeleccionada) return;
        enviar('jugar-carta', { cartaId: cartaSeleccionada.id, colorElegido: color });
        cartaSeleccionada = null;
        document.getElementById('selector-color').style.display = 'none';
      }

      function robarCarta() {
        enviar('robar-carta');
      }

      function cantarUno() {
        enviar('cantar-uno');
      }

      function denunciarUno() {
        if (!rivalesActuales.length) return;
        // Si hay un solo rival, lo acusa directamente; si hay varios, pide elegir
        if (rivalesActuales.length === 1) {
          enviar('denunciar-uno', { acusadoId: rivalesActuales[0].jugadorId });
        } else {
          const nombres = rivalesActuales.map((r, i) => `${i + 1}. ${r.nombreUsuario}`).join('\n');
          const idx = parseInt(prompt(`¿A quién denunciás?\n${nombres}`)) - 1;
          if (idx >= 0 && idx < rivalesActuales.length) {
            enviar('denunciar-uno', { acusadoId: rivalesActuales[idx].jugadorId });
          }
        }
      }

      function iniciarPartida() {
        enviar('iniciar-partida');
      }

      function volverLobby() {
        if (ws) ws.close();
        ws = null;
        partidaId = null;
        cartaSeleccionada = null;
        document.getElementById('overlay').classList.remove('visible');
        document.getElementById('mi-mano').innerHTML = '';
        document.getElementById('log').innerHTML = '';
        mostrar('pantalla-lobby');
        cargarPartidas();
      }

      // ── Fin de partida ──────────────────────────────────────────────────────
      function mostrarFin(ranking, abandono, nombreAbandonó) {
        const titulo = document.getElementById('overlay-titulo');
        const cuerpo = document.getElementById('overlay-cuerpo');

        if (abandono) {
          titulo.textContent = 'Partida cancelada';
          cuerpo.innerHTML = `<p>${nombreAbandonó} abandonó la partida.</p>`;
        } else {
          titulo.textContent = '¡Partida terminada!';
          cuerpo.innerHTML = ranking
            .map(
              (r, i) =>
                `<p>${['🥇','🥈','🥉','4️⃣'][i]} ${r.nombre} — ${r.puntaje} pts (${r.deltaGlobal >= 0 ? '+' : ''}${r.deltaGlobal} global)</p>`
            )
            .join('');
        }

        document.getElementById('overlay').classList.add('visible');
      }

      // ── Helpers ─────────────────────────────────────────────────────────────
      function etiqueta(carta) {
        if (carta.tipo === 'numero') return carta.numero;
        const map = {
          'roba-dos': '+2',
          'roba-tres': '+3',
          'roba-cuatro': '+4',
          reversa: '↺',
          salta: '⊘',
          comodin: '★',
        };
        return map[carta.tipo] || carta.tipo;
      }

      function describir(carta) {
        return `${carta.color || 'comodín'} ${etiqueta(carta)}`;
      }

      function nombreDeJugador(id) {
        if (id === jugadorId) return 'vos';
        const rival = rivalesActuales.find((r) => r.jugadorId === id);
        return rival?.nombreUsuario || id;
      }

      function log(msg) {
        const el = document.createElement('div');
        el.className = 'log-item';
        el.textContent = msg;
        document.getElementById('log').prepend(el);
      }

      // Enter en login
      document.getElementById('input-nombre').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') registrarOIngresar();
      });
    </script>
  </body>
</html>
